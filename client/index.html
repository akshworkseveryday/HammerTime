<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts for Retro Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <title>👾 HAMMERTIME // RETRO_ARCADE_AUCTIONS 👾</title>

    <!-- Theme Color -->
    <meta name="theme-color" content="#4f46e5" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="HammerTime is a real-time bidding platform built with the MERN stack. Create auctions, place bids, and win items online."
    />
    <meta
      name="keywords"
      content="HammerTime, online auction, MERN stack, real-time bidding, auction platform, react node project"
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph for Social Sharing -->
    <meta
      property="og:title"
      content="HammerTime - Real-time Auction Platform"
    />
    <meta
      property="og:description"
      content="Create auctions, place competitive bids in real time, and manage listings on HammerTime."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HammerTime" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="HammerTime - Real-time Auction Platform"
    />
    <meta
      name="twitter:description"
      content="A full-stack MERN auction platform with live bidding powered by Socket.io."
    />

    <!-- AdSense script -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9347518247329906"
      crossorigin="anonymous"
    ></script>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "HammerTime",
        "description": "Real-time online bidding platform built with the MERN stack. Create auctions, place bids, and win items."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
